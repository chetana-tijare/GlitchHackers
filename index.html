<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HostelSync</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1>🏠 HostelSync</h1>

    <!-- Gate Pass Section -->
    <div class="container">
        <h2>Gate Pass System</h2>

        <!-- Form -->
        <input type="text" id="studentName" placeholder="Enter Name">
        <input type="text" id="reason" placeholder="Enter Reason">
        <button onclick="addGatePass()">Submit</button>

        <!-- List -->
        <div id="gatePassList"></div>
    </div>

    <!-- Complaint Section -->
    <div class="container">
        <h2>Complaint System</h2>

        <!-- Input -->
        <input type="text" id="complaintInput" placeholder="Enter Complaint">
        <button onclick="addComplaint()">Submit</button>

        <!-- List -->
        <div id="complaintList"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
