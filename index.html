<!DOCTYPE html>
<html>
<head>
  <title>HostelSync Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="sidebar">
  <h2>HostelSync</h2>
  <a href="index.html">Dashboard</a>
  <a href="gatepass.html">Gate Pass</a>
  <a href="complaints.html">Complaints</a>
  <a href="rooms.html">Rooms</a>
  <a href="mess.html">Mess</a>
</div>

<div class="main">

  <div class="topbar">
    <h1>Dashboard</h1>
    <div>👤 Admin</div>
  </div>

  <div class="cards">

    <div class="card" onclick="openStudents()">
      👨‍🎓 Total Students
      <h2>120</h2>
    </div>

    <div class="card" onclick="openGatePass()">
      🚪 Gate Pass
      <h2 id="passCount">0</h2>
    </div>

    <div class="card" onclick="openComplaints()">
      ⚠ Complaints
      <h2 id="complaintCount">0</h2>
    </div>

    <div class="card">
      🍽 Satisfaction
      <h2>75%</h2>
    </div>

  </div>

  <!-- 🔥 ACTIVITY SECTION -->
  <div class="card" style="margin-top:20px;">
    <h3>📊 Recent Activity</h3>
    <ul id="activityList"></ul>
  </div>

</div>

<script src="js/main.js"></script>
</body>
</html>
